name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ github.event.inputs.bump }} --no-git-tag-version)
          # npm version outputs "v1.2.3", strip the v
          VERSION="${NEW_VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Bump version to ${{ steps.bump.outputs.version }}"
          git push origin main

      - name: Build and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

      - name: Summary
        run: |
          echo "## Release ${{ steps.bump.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Published to [GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.bump.outputs.version }})" >> "$GITHUB_STEP_SUMMARY"
